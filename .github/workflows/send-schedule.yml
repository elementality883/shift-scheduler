# .github/workflows/send-schedule.yml
#
# Sends the shift schedule to WebEx at:
#   08:00 JST  Monday–Friday  (morning — today's schedule)
#   17:00 JST  Monday–Friday  (evening — next work day's schedule)
#
# JST = UTC+9
#   08:00 JST = 23:00 UTC the previous day  → cron: Sun–Thu at 23:00 UTC
#   17:00 JST = 08:00 UTC the same day      → cron: Mon–Fri at 08:00 UTC
#
# TEST cron entries fire every 30 minutes (all days) — remove when done testing!

name: Send Shift Schedule

on:
  schedule:
    # ── TEST: every 30 minutes (remove these two lines when done testing) ──
    # - cron: '17 * * * *'
    # - cron: '37 * * * *'

    # ── PRODUCTION: uncomment these and remove the test lines above ────────
    # 08:00 JST = 23:00 UTC (Sun–Thu covers Mon–Fri JST mornings)
    # - cron: '0 23 * * 0,1,2,3,4'
    # 17:00 JST = 08:00 UTC (Mon–Fri)
    # - cron: '0 8 * * 1,2,3,4,5'

  # Allow manual trigger from the Actions tab at any time
  workflow_dispatch:
    inputs:
      send_type:
        description: 'Which send to trigger'
        required: true
        default: 'evening'
        type: choice
        options:
          - morning
          - evening

# Force all Actions to use Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Determine send type
        id: sendtype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.send_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 20 ] || [ "$HOUR" -lt 4 ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            else
              echo "type=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send schedule to WebEx
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          JSONBIN_BIN: ${{ secrets.JSONBIN_BIN }}
          SEND_TYPE: ${{ steps.sendtype.outputs.type }}
        run: node .github/scripts/send-schedule.js
